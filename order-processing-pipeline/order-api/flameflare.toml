name = "order-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
ORDER_API_KEY = "demo-api-key-12345"

[[queues.producers]]
queue = "payment-queue"
binding = "PAYMENT_QUEUE"

[[workflows]]
name = "order-fulfillment"
binding = "ORDER_WORKFLOW"
class_name = "OrderFulfillmentWorkflow"

[[services]]
binding = "CLEANUP_SERVICE"
service = "cleanup-worker"