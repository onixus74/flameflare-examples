name = "review-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[queues.producers]]
queue = "verdict-queue"
binding = "VERDICT_QUEUE"

[[workflows]]
name = "code-review"
binding = "CODE_REVIEW_WORKFLOW"
class_name = "CodeReviewWorkflow"

[[services]]
binding = "ARCHITECT_AGENT"
service = "architect-agent"

[[services]]
binding = "SECURITY_AGENT"
service = "security-agent"

[[services]]
binding = "SYNTHESIZER_AGENT"
service = "synthesizer-agent"